name: FreeFrame
version: ${project.version}
main: de.isolveproblems.freeframe.FreeFrame
description: Sell items for free in an ItemFrame
authors: [isolveproblems]
softdepend: [Vault]

commands:
  freeframe:
    description: Main command for FreeFrame
    usage: /freeframe <help|info|reload|list|inspect|remove|setprice|migrate|repair|debug>
    aliases: [ff]

permissions:
  freeframe.reload:
    description: Allows reloading the plugin config
    default: op
  freeframe.destroy:
    description: Allows destroying protected free frames
    default: op
  freeframe.admin:
    description: Allows administrative frame management commands
    default: op
    children:
      freeframe.reload: true
      freeframe.destroy: true
      freeframe.access.bypass: true
  freeframe.access.bypass:
    description: Bypass owner-based frame access restrictions
    default: op
