name: FreeFrame
version: ${project.version}
main: de.isolveproblems.freeframe.FreeFrame
description: Sell items for free in an ItemFrame
authors: [isolveproblems]
softdepend: [Vault, PlaceholderAPI, WorldGuard, GriefPrevention]

commands:
  freeframe:
    description: Main command for FreeFrame
    usage: /freeframe <help|info|reload|bid|myshops|list|inspect|remove|setprice|setstock|settype|shoptype|setprofile|clearprofiles|linkchest|network|season|auction|stats|analytics|restockroute|brand|campaign|sync|platform|trust|moderate|zdm|backup|restore|doctor|replay|wand|storage|export|migrate|repair|debug>
    aliases: [ff]

permissions:
  freeframe.reload:
    description: Allows reloading the plugin config
    default: op
  freeframe.destroy:
    description: Allows destroying protected free frames
    default: op
  freeframe.admin:
    description: Allows administrative frame management commands
    default: op
    children:
      freeframe.reload: true
      freeframe.destroy: true
      freeframe.access.bypass: true
  freeframe.access.bypass:
    description: Bypass owner-based frame access restrictions
    default: op
  freeframe.owner.manage:
    description: Allows shop creators to manage their own frames
    default: true
  freeframe.adminonly:
    description: Allows use of admin-only FreeFrames
    default: op
  freeframe.discount.vip:
    description: Applies the VIP discount profile
    default: false
  freeframe.discount.mvp:
    description: Applies the MVP discount profile
    default: false
